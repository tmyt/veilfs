name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The FUSE end-to-end tests need /dev/fuse and the fusermount helper;
      # without them they self-skip, but CI should actually exercise them.
      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y fuse3
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # CGO is disabled so every target cross-compiles from this Linux
      # runner (go-fuse and all deps are pure Go).
      - name: Build veilfs-${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o "dist/veilfs-${{ matrix.goos }}-${{ matrix.goarch }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: veilfs-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/veilfs-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    # Attach the binaries to a GitHub Release when a v* tag is pushed.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/veilfs-* \
            --title "${{ github.ref_name }}" \
            --generate-notes
