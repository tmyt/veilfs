name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The FUSE end-to-end tests need /dev/fuse and the fusermount helper;
      # without them they self-skip, but CI should actually exercise them.
      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y fuse3
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # CGO is disabled so every target cross-compiles from this Linux
      # runner (go-fuse and all deps are pure Go). The version is the tag
      # for v* builds, otherwise dev-<short sha>.
      - name: Build veilfs-${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-${GITHUB_SHA::12}"
          fi
          go build -buildvcs=false -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/veilfs-${{ matrix.goos }}-${{ matrix.goarch }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: veilfs-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/veilfs-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    # Publish the binaries for a v* tag. This fires both when a tag is
    # pushed directly (git push origin v1.0.0) and when a Release is
    # published from the GitHub UI (which writes the tag). The step is
    # idempotent: it attaches assets to an existing Release (preserving
    # hand-written notes) or creates one with generated notes otherwise.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/veilfs-* --clobber
          else
            gh release create "$TAG" dist/veilfs-* \
              --title "$TAG" --generate-notes
          fi
